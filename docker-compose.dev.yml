version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cold_email_bot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./services/core-api/migrations:/migrations:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  db-init:
    image: postgres:16-alpine
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: cold_email_bot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - ./services/core-api/migrations:/migrations:ro
      - ./scripts/init-db.sh:/init-db.sh:ro
    command: /bin/sh /init-db.sh
    restart: "no"

  core-api:
    build:
      context: ./services/core-api
      dockerfile: Dockerfile
      target: development
    ports:
      - "3000:3000"
      - "9229:9229"
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/cold_email_bot
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    volumes:
      - ./services/core-api/src:/app/src:ro
      - ./packages/shared/src:/app/node_modules/@shared/src:ro
    command: npm run dev

  telegram-bot:
    build:
      context: ./services/telegram-bot
      dockerfile: Dockerfile
      target: development
    environment:
      NODE_ENV: development
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      ADMIN_TELEGRAM_IDS: ${ADMIN_TELEGRAM_IDS}
      CORE_API_URL: http://core-api:3000
      REDIS_URL: redis://redis:6379
    depends_on:
      - core-api
      - redis
    volumes:
      - ./services/telegram-bot/src:/app/src:ro
      - ./packages/shared/src:/app/node_modules/@shared/src:ro
    command: npm run dev
    restart: unless-stopped

  worker:
    build:
      context: ./services/worker
      dockerfile: Dockerfile
      target: development
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/cold_email_bot
      REDIS_URL: redis://redis:6379
      CORE_API_URL: http://core-api:3000
      AI_ORCHESTRATOR_URL: http://ai-orchestrator:3002
      GMAIL_SERVICE_URL: http://gmail-service:3001
    depends_on:
      - postgres
      - redis
      - core-api
      - ai-orchestrator
      - gmail-service
    volumes:
      - ./services/worker/src:/app/src:ro
      - ./packages/shared/src:/app/node_modules/@shared/src:ro
    command: npm run dev
    restart: unless-stopped

  gmail-service:
    build:
      context: ./services/gmail-service
      dockerfile: Dockerfile
      target: development
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/cold_email_bot
      REDIS_URL: redis://redis:6379
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI}
      GMAIL_PUBSUB_TOPIC: ${GMAIL_PUBSUB_TOPIC}
    depends_on:
      - postgres
      - redis
    volumes:
      - ./services/gmail-service/src:/app/src:ro
      - ./packages/shared/src:/app/node_modules/@shared/src:ro
    command: npm run dev
    restart: unless-stopped

  ai-orchestrator:
    build:
      context: ./services/ai-orchestrator
      dockerfile: Dockerfile
      target: development
    ports:
      - "3002:3002"
    environment:
      NODE_ENV: development
      PORT: 3002
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/cold_email_bot
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      PERPLEXITY_API_KEY: ${PERPLEXITY_API_KEY}
    depends_on:
      - postgres
    volumes:
      - ./services/ai-orchestrator/src:/app/src:ro
      - ./packages/shared/src:/app/node_modules/@shared/src:ro
    command: npm run dev
    restart: unless-stopped

  observability:
    build:
      context: ./services/observability
      dockerfile: Dockerfile
      target: development
    ports:
      - "9090:9090"
    environment:
      NODE_ENV: development
      PORT: 9090
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/cold_email_bot
    depends_on:
      - redis
      - postgres
    volumes:
      - ./services/observability/src:/app/src:ro
    command: npm run dev

volumes:
  postgres_data:
