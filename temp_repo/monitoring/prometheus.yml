global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'cold-email-bot'
    environment: 'production'

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - '/etc/prometheus/alerts/*.yml'

scrape_configs:
  - job_name: 'cold-email-bot'
    static_configs:
      - targets:
          - 'observability:3002'
        labels:
          service: 'observability'
      
      - targets:
          - 'core-api:3000'
        labels:
          service: 'core-api'
      
      - targets:
          - 'gmail-service:3001'
        labels:
          service: 'gmail-service'
      
      - targets:
          - 'ai-orchestrator:3003'
        labels:
          service: 'ai-orchestrator'

  - job_name: 'postgres'
    static_configs:
      - targets:
          - 'postgres-exporter:9187'

  - job_name: 'redis'
    static_configs:
      - targets:
          - 'redis-exporter:9121'
