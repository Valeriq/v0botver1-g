groups:
  - name: cold_email_bot_alerts
    interval: 30s
    rules:
      - alert: HighErrorRate
        expr: rate(cold_email_bot_errors_total[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value }} errors/sec for {{ $labels.service }}"

      - alert: ServiceDown
        expr: up{job="cold-email-bot"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.service }} is down"
          description: "{{ $labels.service }} has been down for more than 1 minute"

      - alert: QueueBacklog
        expr: cold_email_bot_queue_size > 1000
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Large queue backlog in {{ $labels.queue }}"
          description: "Queue {{ $labels.queue }} has {{ $value }} pending jobs"

      - alert: GmailAccountIssue
        expr: cold_email_bot_gmail_account_status != 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Gmail account {{ $labels.account_email }} has issues"
          description: "Account status is {{ $value }}"

      - alert: LowLeadConversion
        expr: (cold_email_bot_leads_total / cold_email_bot_replies_total) < 0.1
        for: 1h
        labels:
          severity: info
        annotations:
          summary: "Low lead conversion rate"
          description: "Lead conversion rate is {{ $value | humanizePercentage }}"

      - alert: HighJobFailureRate
        expr: rate(cold_email_bot_job_failures_total[5m]) / rate(cold_email_bot_jobs_total[5m]) > 0.2
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "High job failure rate"
          description: "{{ $value | humanizePercentage }} of jobs are failing"
