apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cold-email-bot-ingress
  namespace: cold-email-bot
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - api.cold-email-bot.com
    secretName: cold-email-bot-tls
  rules:
  - host: api.cold-email-bot.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: core-api-service
            port:
              number: 3000
      - path: /gmail
        pathType: Prefix
        backend:
          service:
            name: gmail-service
            port:
              number: 3001
