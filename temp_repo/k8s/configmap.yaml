apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: cold-email-bot
data:
  NODE_ENV: "production"
  POSTGRES_HOST: "postgres-service"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "cold_email_bot"
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  CORE_API_URL: "http://core-api-service:3000"
  GMAIL_SERVICE_URL: "http://gmail-service:3001"
  AI_ORCHESTRATOR_URL: "http://ai-orchestrator-service:3002"
