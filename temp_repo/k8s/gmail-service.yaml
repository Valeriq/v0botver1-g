apiVersion: apps/v1
kind: Deployment
metadata:
  name: gmail-service
  namespace: cold-email-bot
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gmail-service
  template:
    metadata:
      labels:
        app: gmail-service
    spec:
      containers:
      - name: gmail-service
        image: cold-email-bot/gmail-service:latest
        ports:
        - containerPort: 3001
          name: http
        envFrom:
        - configMapRef:
            name: app-config
        - secretRef:
            name: app-secrets
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 30
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: gmail-service
  namespace: cold-email-bot
spec:
  selector:
    app: gmail-service
  ports:
  - port: 3001
    targetPort: 3001
  type: ClusterIP
